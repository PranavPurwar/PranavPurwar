# yaml-language-server: $schema=https://raw.githubusercontent.com/rendercv/rendercv/refs/tags/v2.8/schema.json
cv:
  name: "Pranav Purwar"
  location: "Delhi, India"
  email: "purwarpranav80@gmail.com"
  social_networks:
    - network: GitHub
      username: PranavPurwar
    - network: LinkedIn
      username: pranavpurwar

  sections:
    summary:
      - "Systems & Infrastructure Engineer architecting production-grade compiler toolchains, AI backends, and mobile developer tools. Specialist in JVM internals, KMP, and LLM orchestration with a track record of core contributions to high-traffic open-source ecosystems (10k+ MAU)."

    projects:
      - name: "Bryte AI Platform"
        start_date: "2024-09"
        highlights:
          - "Architected a high-throughput KMP backend to normalize heavy multi-modal unstructured data (long-form video/PDFs) into structured, queryable knowledge graphs."
          - "Engineered a native FSRS v4 implementation in Kotlin, autonomously optimizing cognitive load through real-time Stability/Difficulty/Retrievability computation."
          - "Designed a hybrid GraphRAG architecture on Neo4j that dynamically balances document-level semantics against cross-document relational penalties."
          - "Built an agentic pipeline using a custom Mistral SDK and a stateful MarkdownStreamingParser to reconstruct complex domain objects in real-time from raw LLM tokens."

      - name: "Cosmic IDE"
        start_date: "2021-08"
        highlights:
          - "Built a complete JVM development environment for Android from scratch, supporting Java 27 and Kotlin 2.4 (K2 compiler)."
          - "Implemented full code completion, navigation, and refactoring for Java/Kotlin via LSP integration."
          - "Integrated Git version control, and Gemini AI directly within the IDE."
          - "Added a bytecode disassembler for viewing compiled class files and a custom build system with incremental compilation dropping subsequent build times by ~80%."
          - "Designed a plugin architecture allowing third-party extensions."

      - name: "OpenJDK & Kotlin Compiler Ports (Android)"
        start_date: "2023-09"
        highlights:
          - "Maintain surgical, highly maintainable forks of `javac` (OpenJDK 27+) and `kotlinc` (2.4+) for Android runtime environments (ART)."
          - "Replaced unsafe JVM memory calls (`copyMemory`, `Unsafe.clean`) with NIO-safe alternatives, enabling seamless execution of modern Java/Kotlin features on mobile."
          - "Achieved zero-divergence patches allowing upstream OpenJDK/Kotlin updates to be unified within 48 hours of release with sub-100-line diff overhead."

      - name: "Official Kotlin Compiler Contribution (JetBrains/kotlin #5146)"
        start_date: "2024"
        highlights:
          - "Merged a memory leak fix into the official Kotlin compiler repository."
          - "Diagnosed unreleased `Inflater` resources in `ZipImplementation` when the `-Xuse-fast-jar-file-system` flag is active."
          - "Patched `MappedByteBuffer.contentsToByteArray` to explicitly call `inflater.end()` – resolving resource exhaustion in long-running compilation daemons."
          - "Fix manually reviewed and merged by the JetBrains core compiler team."

      - name: "Sketchware-Pro (Core Team)"
        start_date: "2021-08"
        highlights:
          - "Core maintainer for an Android development platform with **10,000+ MAU**."
          - "Architected the build-system pipeline to support **Java 9/10/11** compilation and integrated **R8 Code Shrinker**, reducing output APK sizes by ~40%."
          - "Implemented ViewBinding support and overhauled the dependency manager for transitive Maven/Gradle resolution."

      - name: "Reef & AppLock (Mobile Product Delivery)"
        start_date: "2024-09"
        highlights:
          - "Developed and published Reef (digital health/focus tool) and AppLock (biometric privacy tool) on F-Droid and IzzyOnDroid with 100k+ combined downloads."
          - "Managed full product lifecycle including Material You UX design, secure local storage architecture, and open-source community translations."

    skills:
      - label: "Languages & Runtimes"
        details: "Kotlin, Java, C++, Python, TypeScript, JVM Bytecode, DEX/ART"
      - label: "Compiler & Toolchain"
        details: "OpenJDK Toolchain, Kotlin Compiler, JDT Language Server, Gradle, R8"
      - label: "Backend & AI Infrastructure"
        details: "Ktor, kotlinx.rpc, Neo4j (Cypher/Vector), GraphRAG, LLM Agents (Koog), FSRS, Mistral/Cohere APIs"
      - label: "Mobile & Platforms"
        details: "Android SDK, Jetpack Compose, Kotlin Multiplatform (KMP), Material You, F-Droid Publishing"


design:
  theme: classic
  page:
    size: a4
    top_margin: 0.5in
    bottom_margin: 0.5in
    left_margin: 0.45in
    right_margin: 0.45in
    show_footer: true
    show_top_note: true
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 79, 144)
    headline: rgb(0, 79, 144)
    connections: rgb(0, 79, 144)
    section_titles: rgb(0, 79, 144)
    links: rgb(0, 79, 144)
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  typography:
    line_spacing: 0.5em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: Source Sans 3
      name: Source Sans 3
      headline: Source Sans 3
      connections: Source Sans 3
      section_titles: Source Sans 3
    font_size:
      body: 10pt
      name: 24pt
      headline: 10pt
      connections: 10pt
      section_titles: 1.4em
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: true
      headline: false
      connections: false
      section_titles: false
  links:
    underline: false
    show_external_link_icon: false
  header:
    alignment: center
    photo_width: 3.5cm
    photo_position: left
    photo_space_left: 0.4cm
    photo_space_right: 0.4cm
    space_below_name: 0.7cm
    space_below_headline: 0.7cm
    space_below_connections: 0.7cm
    connections:
      phone_number_format: national
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: false
      separator: ''
      space_between_connections: 0.5cm
  section_titles:
    type: with_partial_line
    line_thickness: 0.5pt
    space_above: 0.4cm
    space_below: 0.3cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 0.8em
    space_between_text_based_entries: 0.3em
    show_time_spans_in:
      - experience
  entries:
    date_and_location_width: 3.4cm
    side_space: 0.2cm
    space_between_columns: 0.1cm
    allow_page_break: false
    short_second_row: true
    degree_width: 1cm
    summary:
      space_above: 0cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: •
      space_left: 0.15cm
      space_above: 0cm
      space_between_items: 0cm
      space_between_bullet_and_text: 0.5em
  templates:
    footer: '*NAME -- PAGE_NUMBER/TOTAL_PAGES*'
    top_note: '*LAST_UPDATED CURRENT_DATE*'
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: '**LABEL:** DETAILS'
    education_entry:
      main_column: |-
        **INSTITUTION**, AREA
        SUMMARY
        HIGHLIGHTS
      degree_column: '**DEGREE**'
      date_and_location_column: |-
        LOCATION
        DATE
    normal_entry:
      main_column: |-
        **NAME**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    experience_entry:
      main_column: |-
        **COMPANY**, POSITION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    publication_entry:
      main_column: |-
        **TITLE**
        SUMMARY
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE
