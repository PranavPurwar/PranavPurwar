cv:
  name: "Pranav Purwar"
  headline: "18-year-old Self-Taught Systems Engineer & Open-Source Maintainer"
  location: "Delhi, India"
  email: "purwarpranav80@gmail.com"
  social_networks:
    - network: GitHub
      username: PranavPurwar
    - network: LinkedIn
      username: pranavpurwar

  sections:
    summary:
      - "Systems engineer specializing in JVM internals, compiler toolchains, AI infrastructure, and Android developer tools. Core contributor and maintainer of open-source platforms serving 100k+ users."

    projects:
      - name: "Bryte AI Platform"
        start_date: "2024-09"
        highlights:
          - "Engineered a full KMP backend (Ktor 3.5) utilizing `kotlinx.rpc` over WebSockets for full-duplex streaming. Implemented stateful AI agent orchestration (JetBrains Koog) with custom history compression to manage 100k+ token contexts natively."
          - "Built a multi-modal ingestion pipeline bypassing official APIs (custom NewPipe extractor, custom Mistral SDK). Developed a hybrid GraphRAG engine on Neo4j executing weighted Cypher queries and Cohere reranking to balance local document focus against cross-document semantic bridges."
          - "Built an event-driven streaming parser that intercepts fragmented LLM tokens, utilizing heuristic recovery and secondary LLM fallbacks to reconstruct broken structures mid-stream. Ported the FSRS v4 algorithm to Kotlin, calculating Stability, Difficulty, and Retrievability for dynamic cognitive scheduling."

      - name: "OpenJDK & Kotlin Compiler Ports (Android)"
        start_date: "2023-09"
        highlights:
          - "Port `javac` (OpenJDK 27 EA) and `kotlinc` (2.4+) to the Android Runtime (ART), maintaining highly cohesive patches to sync upstream releases within 48 hours."
          - "Rewrote `javac`'s internal platform resolution to bypass Android's restricted NIO (implementing a custom `ZipFileSystem` for `ct.sym`) and replaced `URLClassLoader` with Android's `PathClassLoader` in `kotlinc` to resolve classloading incompatibilities."
          - "Engineered a custom memory reclamation layer using `HiddenApiBypass` to invoke Android's internal `NioUtils.freeDirectBuffer`, preventing fatal native OOM crashes during memory-mapped JAR parsing."

      - name: "Official Kotlin Compiler Contribution (JetBrains/kotlin #5146)"
        date: "2023-11"
        highlights:
          - "Merged a critical memory leak fix into the official Kotlin compiler repository."
          - "Diagnosed unreleased `Inflater` resources in `ZipImplementation` when the `-Xuse-fast-jar-file-system` flag is active."
          - "Patched `MappedByteBuffer.contentsToByteArray` to explicitly call `inflater.end()`, resolving resource exhaustion in long-running compilation daemons."

      - name: "Cosmic IDE"
        start_date: "2021-08"
        highlights:
          - "Built a complete, from-scratch JVM development environment for Android, integrating custom compiler toolchains, LSP-based code completion, and a plugin architecture."
          - "Integrated the Kotlin Incremental Compiler and optimized the build pipeline, reducing subsequent IDE compilation latency by ~80%."
          - "Added Git version control, Gemini AI, and a custom bytecode disassembler directly into the mobile IDE."

      - name: "Sketchware-Pro (Core Team & Technical Lead)"
        start_date: "2021-08"
        highlights:
          - "Core team member and technical lead for an Android development platform with 1.6k+ GitHub stars and 10,000+ MAU."
          - "Led architectural decisions and conducted rigorous code reviews for a distributed team of 58 active contributors, enforcing CI/CD standards and design patterns."
          - "Built the build-system pipeline to support Java 9/11 compilation and integrated the R8 Code Shrinker, reducing output APK sizes by ~40%."

      - name: "Reef & AppLock (Mobile Product Delivery)"
        start_date: "2024-09"
        highlights:
          - "Developed and published Reef (digital health) and AppLock (biometric privacy) on F-Droid and IzzyOnDroid, achieving 100k+ combined downloads."
          - "Managed the full product lifecycle including Material You UX design, secure local storage architecture, and open-source community translations."

    skills:
      - label: "Languages"
        details: "Kotlin, Java, Python, TypeScript, JVM Bytecode, DEX/ART"
      - label: "Compiler & Toolchain"
        details: "OpenJDK, Kotlin, ART, LSP, Gradle, R8/D8, Hidden API Bypass"
      - label: "Backend & AI Infrastructure"
        details: "Ktor, Neo4j (Cypher/Vector), GraphRAG, LLM Agents, FSRS, Mistral/Cohere APIs"
      - label: "Mobile & Platforms"
        details: "Android SDK, Jetpack Compose, Kotlin Multiplatform (KMP), Material You, F-Droid"

design:
  theme: classic
  page:
    size: a4
    top_margin: 0.5in
    bottom_margin: 0.5in
    left_margin: 0.47in
    right_margin: 0.47in
    show_footer: true
    show_top_note: true
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 79, 144)
    headline: rgb(0, 79, 144)
    connections: rgb(0, 79, 144)
    section_titles: rgb(0, 79, 144)
    links: rgb(0, 79, 144)
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  typography:
    line_spacing: 0.5em
    alignment: justified
    date_and_location_column_alignment: right
    font_family:
      body: Source Sans 3
      name: Source Sans 3
      headline: Source Sans 3
      connections: Source Sans 3
      section_titles: Source Sans 3
    font_size:
      body: 10pt
      name: 24pt
      headline: 10pt
      connections: 10pt
      section_titles: 1.3em # Reduced from 1.4em
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
    bold:
      name: true
      headline: false
      connections: false
      section_titles: false
  links:
    underline: false
    show_external_link_icon: false
  header:
    alignment: center
    space_below_name: 0.4cm
    space_below_headline: 0.4cm
    space_below_connections: 0.4cm
    connections:
      phone_number_format: national
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: false
      separator: ''
      space_between_connections: 0.4cm
  section_titles:
    type: with_partial_line
    line_thickness: 0.5pt
    space_above: 0.3cm
    space_below: 0.4cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 0.5em # Reduced from 0.8em
    space_between_text_based_entries: 0.2em
    show_time_spans_in:
      - experience
  entries:
    date_and_location_width: 3.2cm
    side_space: 0.15cm
    space_between_columns: 0.1cm
    allow_page_break: false
    short_second_row: true
    degree_width: 1cm
    summary:
      space_above: 0cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: •
      space_left: 0.15cm
      space_above: 0cm
      space_between_items: 0.1em # Added slight spacing for readability
      space_between_bullet_and_text: 0.4em
  templates:
    footer: ''
    top_note: ''
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: '**LABEL:** DETAILS'
    education_entry:
      main_column: |-
        **INSTITUTION**, AREA
        SUMMARY
        HIGHLIGHTS
      degree_column: '**DEGREE**'
      date_and_location_column: |-
        LOCATION
        DATE
    normal_entry:
      main_column: |-
        **NAME**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    experience_entry:
      main_column: |-
        **COMPANY**, POSITION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    publication_entry:
      main_column: |-
        **TITLE**
        SUMMARY
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE
